name: Release

# release-please keeps a "Release x.y.z" PR open (version bump + changelog) as commits land on main.
# Merging that PR cuts the tag + GitHub Release; the publish job then ships it to npm.
# Publish lives in THIS workflow (not a separate on:release run) because a release cut with the
# default GITHUB_TOKEN won't trigger other workflows. Keep this filename — npm's Trusted Publisher references it.

on:
  push:
    branches: [main]

concurrency:
  group: release
  cancel-in-progress: false

permissions: {}

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write # tag + release
      pull-requests: write # the release PR
    outputs:
      release_created: ${{ steps.release.outputs.release_created }} # singular; the plural is truthy on no-op runs
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          release-type: node

  publish:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # OIDC token npm verifies — provenance, no long-lived token
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"
      - run: npm install -g npm@latest # trusted publishing needs npm >= 11.5.1
      - run: bun install --frozen-lockfile
      - run: bun run build
      - run: bun test
      - run: npm publish # OIDC + provenance are automatic; no NODE_AUTH_TOKEN
