name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - "src/**"
      - "test/**"
      - "package.json"
      - "tsconfig.json"
      - "biome.json"
      - "tsdown.config.ts"

concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    # Same-repo PRs only: a fork PR has no access to secrets, so it would no-op
    # anyway — this just avoids spinning up a runner for it. Skip drafts.
    if: >
      github.event.pull_request.draft == false &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      pull-requests: write
      id-token: write # the action mints its GitHub token via OIDC — required
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: true
          use_sticky_comment: true
          prompt: |
            Review PR #${{ github.event.pull_request.number }} in ${{ github.repository }}
            — "${{ github.event.pull_request.title }}" by ${{ github.actor }}.
            Follow .github/review-rules.md (loaded into your system prompt) exactly.
          claude_args: |
            --model claude-opus-4-8
            --effort high
            --max-turns 20
            --append-system-prompt-file .github/review-rules.md
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Read,Grep,Glob"
